<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../images/favicon.svg" type="image/x-icon">
    <title>Cotizador FlyRED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <link rel="stylesheet" href="../styles/cotizadoresRED.css">
</head>
<body>
    <div class="body_container">
        <span><a href="../index.html">Volver</a></span>
        <h2>Cotizador Ricale Academy - FlyRED - v. Pro Mar26</h2>
        <div class="grid-layout">
            <div class="col">
                <fieldset>
                    <legend>Tipo de Viaje y Forma de Pago</legend>
                    <div class="form-group">
                        <label>Tipo de Destino:</label>
                        <select id="srv_dest">
                            <option value="">Seleccione...</option>
                            <option value="cabotaje">Dentro de Argentina</option>
                            <option value="internacional">Internacional</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Moneda de Pago:</label>
                        <select id="pay_curr">
                            <option value="">Seleccione...</option>
                            <option value="Dólares">Dólares</option>
                            <option value="Pesos">Pesos</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Método de Pago:</label>
                        <select id="pay_tipe">
                            <option value="">Seleccione...</option>
                            <option value="Depósito">Depósito</option>
                            <option value="Tarjeta de Crédito">Tarjeta de Crédito</option>
                            <option value="Transferencia">Transferencia</option>
                        </select>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Datos del Producto (FlyRED)</legend>
                    <div class="form-group"><label>Moneda Cotización:</label>
                        <select id="flyred_curr">
                            <option value="">Seleccione...</option>
                            <option value="Dólares">Dólares</option>
                            <option value="Pesos">Pesos</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Tarifa SIN Impuestos:</label><input type="number" id="flyred_fare" value="0.00" min="0"></div>
                    <div class="form-group"><label>Impuestos:</label><input type="number" id="flyred_tax" value="0.00" min="0"></div>
                    <div class="form-group"><label>Fee Ricale:</label><input type="number" id="flyred_issuefee" value="0.00" min="0"></div>
                    <div class="form-group"><label>Comisión Promotor:</label><input type="number" id="flyred_comi" value="0.00" min="0"></div>
                    <div class="form-group"><label>Over Promotor:</label><input type="number" id="flyred_over" value="0.00" min="0"></div>
                </fieldset>
                <fieldset>
                    <legend>Adicional Promotor</legend>
                    <div class="form-group"><label>Fee Promotor:</label><input type="number" id="srv_fee" value="0.00" min="0"></div>
                </fieldset>    
            </div>
            <div class="col">
                <fieldset>
                    <legend>Datos del Cliente</legend>
                    <div class="form-group"><label>ID Cliente:</label><input type="number" id="client_info" value="0" min="0"></div>
                    <div class="form-group"><label>CUIT/CUIL:</label><input type="number" id="client_cuit" value="0" min="0"></div>
                    <div class="form-group"><label>Detalle Reserva:</label><input type="text" id="client_pnr" value="_"></div>
                </fieldset>
                <div class="buttons">
                    <button class="btn-calc" onclick="calcular()">Calcular</button>
                    <button class="btn-pdf" onclick="descargarPDF()">Descargar PDF</button>
                    <button class="btn-clear" onclick="limpiar()">Limpiar</button>
                    <button class="btn-mail" onclick="enviarEmail()">Enviar por Mail</button>
                </div>
                <div style="margin-top: 5px;">
                    <fieldset>
                        <legend>Cálculos de Tarifa</legend>
                        <div class="form-group"><label>Costo Total FlyRED:</label><span id="out_cost" class="readonly-box">0.00</span></div>
                        <div class="form-group"><label>Utilidad Total FlyRED:</label><span id="out_revn" class="readonly-box">0.00</span></div>
                    </fieldset>
                </div>
            </div>
            <div class="total-box">
                <div class="form-group"><label>Total Producto incluido Fee Adicional Promotor:</label><span id="out_val_prod" class="readonly-box" style="width: 200px">0.00</span></div>
                <div class="form-group"><label>Gastos por <span id="out_pTipe">__</span>:</label><span id="out_gastos" class="readonly-box" style="width: 200px">0.00</span></div>
                <div class="form-group"><label style="font-size: 1.2em; font-weight: bold">Importe Final  a Facturar al Cliente:</label><span id="out_sale_info" class="readonly-box" style="font-size: 1.2em; width: 200px; color: #BB1010">0.00</span></div>
                <div class="form-group"><label>Rentabilidad Total a Cobrar Neta de Impuestos:</label><span id="out_rent_final" class="readonly-box" style="font-size: 1.2em; width: 200px; color: #1E8449">0.00</span></div>
            </div>
        </div>
    </div>

    <div id="resumen-pdf">
        <div class="pdf-header">
            <h2>Resumen de Cotización</h2>
            <p style="text-align: center; ">Generado automáticamente por Cotizador - FlyRED - v. Pro Mar26</p>
        </div>
        <div id="pdf-content"></div>
    </div>

    <script src="../scripts/flyRED.js"></script>
</body>
</html>
